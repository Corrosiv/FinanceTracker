name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Install EF Core Tools
        run: dotnet tool install --global dotnet-ef

      - name: List EF Core Migrations
        run: dotnet ef migrations list --project FinanceTracker.API/FinanceTracker.API.csproj

      - name: Validate EF Core Migrations
        run: |
          # List migrations to ensure they are discoverable
          dotnet ef migrations list --project FinanceTracker.API/FinanceTracker.API.csproj

          # Apply migrations to a temporary SQLite file to verify they apply cleanly in CI
          dotnet ef database update --project FinanceTracker.API/FinanceTracker.API.csproj --no-build --connection "Data Source=ci_migrations_test.db"
          ls -l ci_migrations_test.db || true
